services:
  nginx:
    image: nginx:1.27-alpine
    container_name: taskflow-nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: taskflow-php
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-taskflow}
      DB_USER: ${DB_USER:-taskflow}
      DB_PASSWORD: ${DB_PASSWORD:-taskflow}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-900}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-604800}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-http://localhost:8080}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-60}
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: taskflow-mysql
    environment:
      MYSQL_DATABASE: ${DB_NAME:-taskflow}
      MYSQL_USER: ${DB_USER:-taskflow}
      MYSQL_PASSWORD: ${DB_PASSWORD:-taskflow}
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - taskflow_mysql_data:/var/lib/mysql

volumes:
  taskflow_mysql_data:
